<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tu Nombre — Portafolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/shared.css" />
  <style>
    /* ── HOME EXCLUSIVO ── */
    body { overflow: hidden; height: 100svh; cursor: none; }

    /* Cursor personalizado */
    .cursor {
      position: fixed; z-index: 9999;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform .1s, width .25s, height .25s, background .25s;
      mix-blend-mode: difference;
    }
    .cursor.hover {
      width: 48px; height: 48px;
      background: var(--accent);
    }

    /* Canvas de fondo */
    #canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* Overlay de grano */
    .grain {
      position: fixed; inset: 0; z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: .6;
    }

    /* Layout principal */
    .home-layout {
      position: relative; z-index: 2;
      height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr 1fr;
      padding: 2.5rem 3rem;
    }

    /* Logo / nombre — esquina superior izquierda */
    .home-logo {
      grid-column: 1; grid-row: 1;
      align-self: start;
    }
    .home-logo .initials {
      font-family: var(--font-mono);
      font-size: .85rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* Claim central — span ambas columnas centrado */
    .home-center {
      grid-column: 1 / -1; grid-row: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1rem;
      pointer-events: none;
    }
    .home-eyebrow {
      font-family: var(--font-mono);
      font-size: .7rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      animation: rise .7s .2s ease forwards;
    }
    .home-name {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 10vw, 9rem);
      font-weight: 300;
      line-height: .95;
      color: var(--ink);
      opacity: 0;
      animation: rise .8s .35s ease forwards;
    }
    .home-name em {
      font-style: italic;
      color: var(--accent);
    }
    .home-role {
      font-family: var(--font-body);
      font-size: clamp(.9rem, 1.5vw, 1.1rem);
      color: var(--ink-muted);
      font-weight: 300;
      letter-spacing: .04em;
      opacity: 0;
      animation: rise .7s .5s ease forwards;
    }

    /* Nav inferior — dos botones grandes */
    .home-nav {
      grid-column: 1 / -1; grid-row: 3;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-top: 2rem;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      gap: .35rem;
      opacity: 0;
      animation: rise .7s ease forwards;
      cursor: none;
    }
    .nav-btn:nth-child(1) { animation-delay: .65s; align-items: flex-start; }
    .nav-btn:nth-child(2) { animation-delay: .8s;  align-items: flex-end; }

    .nav-btn .label {
      font-family: var(--font-mono);
      font-size: .7rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      transition: color .3s;
    }
    .nav-btn .title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 4.5rem);
      font-weight: 300;
      line-height: 1;
      color: var(--ink);
      position: relative;
      transition: color .3s;
    }
    .nav-btn .title::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width .4s ease;
    }
    .nav-btn:nth-child(2) .title::after { left: auto; right: 0; }
    .nav-btn:hover .title::after { width: 100%; }
    .nav-btn:hover .title { color: var(--accent); }
    .nav-btn:hover .label { color: var(--accent); }

    .nav-btn .arrow {
      font-size: 1.4rem;
      color: var(--accent);
      display: block;
      transition: transform .3s;
    }
    .nav-btn:hover .arrow { transform: translateX(6px); }
    .nav-btn:nth-child(2):hover .arrow { transform: translateX(-6px); }

    /* Badge año */
    .year-badge {
      position: fixed;
      right: 3rem; top: 50%;
      transform: translateY(-50%) rotate(90deg);
      transform-origin: center;
      font-family: var(--font-mono);
      font-size: .65rem;
      letter-spacing: .3em;
      color: var(--ink-muted);
      z-index: 3;
      opacity: 0;
      animation: rise .7s 1s ease forwards;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      body { overflow-y: auto; }
      .home-layout { padding: 1.5rem; grid-template-columns: 1fr; }
      .home-nav { flex-direction: column; gap: 2rem; align-items: stretch; }
      .nav-btn:nth-child(2) { align-items: flex-start; }
      .year-badge { display: none; }
    }
  </style>
</head>
<body class="dark">

  <div class="cursor" id="cursor"></div>
  <div class="grain"></div>
  <canvas id="canvas"></canvas>

  <div class="home-layout">

    <div class="home-logo">
      <span class="initials">TN — Portafolio</span>
    </div>

    <div class="home-center">
      <span class="home-eyebrow">Diseño · Código · Concepto</span>
      <h1 class="home-name">Tu<br /><em>Nombre</em></h1>
      <p class="home-role">Desarrollador & Diseñador digital</p>
    </div>

    <nav class="home-nav">
      <a href="trabajos/index.html" class="nav-btn" id="btn-trabajos">
        <span class="label">01 — Explorar</span>
        <span class="title">Trabajos</span>
        <span class="arrow">→</span>
      </a>

      <a href="sobre-mi/index.html" class="nav-btn" id="btn-sobre">
        <span class="label">02 — Conocerme</span>
        <span class="title">Sobre mí</span>
        <span class="arrow">←</span>
      </a>
    </nav>

  </div>

  <div class="year-badge">© 2025</div>

  <script>
    /* ── CURSOR ── */
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });
    document.querySelectorAll('a').forEach(a => {
      a.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      a.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    /* ── CANVAS: CONSTELACIÓN GENERATIVA ── */
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H, nodes, mouse = { x: -999, y: -999 };

    const COUNT   = 90;
    const CONNECT = 130; // distancia máxima de conexión
    const MOUSE_R = 200; // radio de influencia del mouse

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function initNodes() {
      nodes = Array.from({ length: COUNT }, () => ({
        x:  Math.random() * W,
        y:  Math.random() * H,
        vx: (Math.random() - .5) * .4,
        vy: (Math.random() - .5) * .4,
        r:  Math.random() * 1.5 + .5,
      }));
    }

    document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Mover nodos
      nodes.forEach(n => {
        // Repulsión suave del mouse
        const dx = n.x - mouse.x;
        const dy = n.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < MOUSE_R) {
          const force = (MOUSE_R - dist) / MOUSE_R * .6;
          n.vx += (dx / dist) * force;
          n.vy += (dy / dist) * force;
        }

        // Fricción
        n.vx *= .985;
        n.vy *= .985;

        n.x += n.vx;
        n.y += n.vy;

        // Rebotar
        if (n.x < 0 || n.x > W) n.vx *= -1;
        if (n.y < 0 || n.y > H) n.vy *= -1;
      });

      // Conexiones
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const a = nodes[i], b = nodes[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d  = Math.sqrt(dx * dx + dy * dy);
          if (d < CONNECT) {
            const alpha = (1 - d / CONNECT) * .35;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(200, 92, 58, ${alpha})`;
            ctx.lineWidth   = .6;
            ctx.stroke();
          }
        }
      }

      // Puntos
      nodes.forEach(n => {
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(200, 92, 58, 0.6)';
        ctx.fill();
      });

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); initNodes(); });
    resize();
    initNodes();
    draw();
  </script>
</body>
</html>
